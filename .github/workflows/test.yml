name: Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Mondays 06:00 UTC — re-runs the live on-chain config check to catch drift
    # (a re-deployed/changed contract, a chain that moved) even when
    # config/networks.ts itself hasn't been touched.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (hermetic)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  onchain:
    name: On-chain config (live RPC)
    # Live RPC calls are kept off per-PR so a transient RPC outage can't red a
    # PR; they run weekly (drift detection) and on demand before a release.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:onchain
