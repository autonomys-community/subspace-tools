name: On-chain config check

# Runs the live RPC verification ONLY when the network config changes — the one
# moment a wai3Address / chainId could go wrong — plus on demand. Kept separate
# from the hermetic test suite so a transient RPC outage can never red an
# unrelated PR; here, a failure means the config genuinely disagrees with the
# chain (or the RPC is down on a config change, which is worth blocking on).
on:
  pull_request:
    paths:
      - config/networks.ts
  workflow_dispatch:

permissions:
  contents: read

jobs:
  onchain:
    name: On-chain config (live RPC)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:onchain
